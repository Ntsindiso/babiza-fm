name: Babiza FM 24/7 Radio

on:
  workflow_dispatch:

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Shuffle and Broadcast
        run: |
          while true; do
            # This shuffles everything in the music folder
            find music -name "*.mp3" | shuf > playlist.txt
            
            # This streams to your Zeno station using the original method
            ffmpeg -re -f concat -safe 0 -i <(sed 's/^/file /' playlist.txt) -f flv "rtmp://link.zeno.fm:80/fl9cqwh5b6ftv/JJq8xWfy"
          done
