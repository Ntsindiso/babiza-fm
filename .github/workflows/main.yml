name: Babiza FM 24/7 Radio

on:
  workflow_dispatch:

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Shuffle and Broadcast
        run: |
          while true; do
            # 1. This looks INSIDE your music folder and handles names like "01 Yimi Umalume.mp3"
            find music/ -name "*.mp3" -printf "file '%p'\n" | shuf > playlist.txt
            
            # 2. Safety check: if no files are found, it will tell us why
            if [ ! -s playlist.txt ]; then
              echo "ERROR: No .mp3 files found in the music folder!"
              exit 1
            fi

            # 3. Stream to Zeno
            ffmpeg -re -f concat -safe 0 -i playlist.txt -f flv "rtmp://link.zeno.fm:80/f19cqwh5b6ftv/JJq8xWfy"
          done
