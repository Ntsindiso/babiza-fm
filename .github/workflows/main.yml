name: Babiza FM 24/7 Radio

on:
  workflow_dispatch:

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Shuffle and Broadcast
        run: |
          while true; do
            # 1. This finds all your renamed mp3s in the music folder
            find music/ -name "*.mp3" > playlist.txt
            
            # 2. This checks if the playlist actually has songs
            if [ ! -s playlist.txt ]; then
              echo "No songs found! Check the music folder."
              exit 1
            fi

            # 3. This shuffles and streams to Zeno
            ffmpeg -re -f concat -safe 0 -i <(sed 's/^/file /' playlist.txt | shuf) -f flv "rtmp://link.zeno.fm:80/fl9cqwh5b6ftv/JJq8xWfy"
          done
