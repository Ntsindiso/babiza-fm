- name: Broadcast Babiza FM
  run: |
    while true; do
      # 1. Shuffle and Play Morning
      find music/morning -name "*.mp3" | shuf > playlist.txt
      ffmpeg -re -f concat -safe 0 -i <(sed 's/^/file /' playlist.txt) -f flv rtmp://YOUR_ZENO_SERVER_URL/YOUR_STREAM_KEY

      # 2. Shuffle and Play Midday
      find music/midday -name "*.mp3" | shuf > playlist.txt
      ffmpeg -re -f concat -safe 0 -i <(sed 's/^/file /' playlist.txt) -f flv rtmp://YOUR_ZENO_SERVER_URL/YOUR_STREAM_KEY

      # 3. Shuffle and Play Night
      find music/night -name "*.mp3" | shuf > playlist.txt
      ffmpeg -re -f concat -safe 0 -i <(sed 's/^/file /' playlist.txt) -f flv rtmp://YOUR_ZENO_SERVER_URL/YOUR_STREAM_KEY
    done
