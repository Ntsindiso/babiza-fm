name: Babiza FM 24/7 Radio

on:
  workflow_dispatch:

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Shuffle and Broadcast
        run: |
          while true; do
            # This finds EVERY mp3 file anywhere in your project
            find . -name "*.mp3" -printf "file '%p'\n" | shuf > playlist.txt
            
            # This checks if it found any music
            if [ ! -s playlist.txt ]; then
              echo "Error: No MP3 files found anywhere!"
              exit 1
            fi

            # This streams to Zeno
            ffmpeg -re -f concat -safe 0 -i playlist.txt -f flv "rtmp://link.zeno.fm:80/fl9cqwh5b6ftv/JJq8xWfy"
          done
